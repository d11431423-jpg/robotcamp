<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TACTICAL MATRIX SYSTEM</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Courier New', Courier, monospace, "System-UI", sans-serif; }
        body, html { width: 100%; height: 100%; background-color: #020608; color: #00f0ff; overflow: hidden; position: relative; }
        
        body::before {
            content: " "; display: block; position: absolute; top: 0; left: 0; bottom: 0; right: 0;
            background-image: linear-gradient(rgba(0, 240, 255, 0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(0, 240, 255, 0.03) 1px, transparent 1px);
            background-size: 30px 30px; z-index: 1; pointer-events: none;
        }
        body::after {
            content: " "; display: block; position: absolute; top: 0; left: 0; bottom: 0; right: 0;
            background: radial-gradient(circle, rgba(0,0,0,0) 50%, rgba(2,6,8,0.9) 100%); z-index: 2; pointer-events: none;
        }

        .hud-screen {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 95vw; height: 95vw; max-width: 850px; max-height: 850px; z-index: 10;
            background: rgba(4, 10, 15, 0.85); border: 2px solid rgba(0, 240, 255, 0.3);
            box-shadow: 0 0 40px rgba(0, 240, 255, 0.1), inset 0 0 30px rgba(0, 240, 255, 0.05);
            display: grid; grid-template-columns: 1.3fr 1.9fr 1.4fr; grid-template-rows: 0.6fr 2fr 0.8fr; padding: 25px; gap: 20px;
        }
        .hud-border-svg { position: absolute; top: -2px; left: -2px; width: calc(100% + 4px); height: calc(100% + 4px); pointer-events: none; stroke: currentColor; fill: none; stroke-width: 2; opacity: 0.8; }
        .top-left-panel { grid-column: 1; grid-row: 1; display: flex; align-items: center; }
        .team-title { font-size: 18px; font-weight: 900; letter-spacing: 1px; text-shadow: 0 0 10px currentColor; line-height: 1.3; }

        .mid-left-panel { display: flex; justify-content: space-around; align-items: flex-end; grid-column: 1; grid-row: 2; height: 100%; padding: 10px 5px; border: 1px solid rgba(0, 240, 255, 0.15); background: rgba(0,0,0,0.2); }
        .vertical-bar-container { display: flex; flex-direction: column; align-items: center; justify-content: flex-end; width: 30%; height: 100%; gap: 8px; }
        .v-bar-val { font-size: 11px; font-weight: bold; font-family: monospace; text-align: center; color: #fff; }
        .v-bar-outer { width: 22px; flex-grow: 1; border: 2px solid rgba(0, 240, 255, 0.4); padding: 2px; background: rgba(0,0,0,0.6); position: relative; display: flex; align-items: flex-end; }
        .v-bar-inner { width: 100%; background: currentColor; transition: height 0.6s cubic-bezier(0.1, 0.8, 0.3, 1); filter: drop-shadow(0 0 6px currentColor); }
        .v-bar-grid { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(180deg, transparent 70%, #020608 70%); background-size: 100% 10px; pointer-events: none; }
        .v-bar-label { font-size: 13px; font-weight: 900; text-shadow: 0 0 8px currentColor; text-align: center; writing-mode: vertical-lr; letter-spacing: 2px; }
        
        .bottom-left-panel { grid-column: 1; grid-row: 3; border: 1px solid rgba(0, 240, 255, 0.2); background: rgba(0,0,0,0.3); position: relative; }

        .center-core { grid-column: 2; grid-row: 1 / span 3; display: flex; justify-content: center; align-items: center; position: relative; }
        .radar-group { width: 95%; height: 95%; }
        .radar-circle { fill: none; stroke: currentColor; stroke-width: 1.5; transform-origin: center; }
        .radar-rotate-fast { animation: rotateRadar 12s linear infinite; }
        .radar-rotate-slow { animation: rotateRadar 25s linear reverse infinite; }

        .top-right-panel {
            grid-column: 3; grid-row: 1 / span 2; border: 2px solid rgba(0, 240, 255, 0.3); 
            background: rgba(3, 12, 20, 0.7); padding: 18px; position: relative;
            clip-path: polygon(0 0, 85% 0, 100% 10%, 100% 100%, 0 100%);
            display: flex; flex-direction: column; gap: 10px; justify-content: center;
        }
        .mission-content { font-size: 14px; line-height: 1.5; color: #ffffff; font-weight: bold; }
        
        .action-box { display: flex; flex-direction: column; margin-top: 10px; }
        .hud-btn {
            display: block; width: 100%; padding: 12px 12px; background: rgba(0, 240, 255, 0.1);
            border: 2px solid currentColor; color: currentColor; text-align: center; cursor: pointer; font-size: 13px; font-weight: 900;
            transition: all 0.2s; clip-path: polygon(0 0, 95% 0, 100% 30%, 100% 100%, 5% 100%, 0 70%); margin-top: 8px;
        }
        .hud-btn:hover { background: currentColor; color: #020608; box-shadow: 0 0 15px currentColor; }

        .bottom-right-panel { grid-column: 3; grid-row: 3; border: 1px solid rgba(0, 240, 255, 0.2); padding: 15px; display: flex; flex-direction: column; justify-content: center; gap: 8px; clip-path: polygon(0 0, 100% 0, 100% 75%, 85% 100%, 0 100%); }
        .status-line { display: flex; justify-content: space-between; font-size: 14px; font-weight: bold; color: rgba(0,240,255,0.8); }

        .host-screen {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 100;
            background: #040d14; padding: 25px; overflow-y: auto; color: #00f0ff;
        }
        .host-top-bar { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #00f0ff; padding-bottom: 10px; margin-bottom: 20px; }
        .host-header { font-size: 26px; font-weight: 900; color: #ff7300; text-shadow: 0 0 10px #ff7300; }
        .sync-indicator { font-size: 13px; color: #00ffaa; margin-left: 15px; font-weight: normal; }
        .reset-btn { background: #ff3333; color: #fff; border: none; padding: 8px 16px; font-size: 14px; font-weight: bold; cursor: pointer; border-radius: 4px; box-shadow: 0 0 10px rgba(255,51,51,0.4); transition: background 0.2s; }
        .reset-btn:hover { background: #ff5555; }
        
        .round-tabs { display: flex; gap: 10px; margin-bottom: 20px; }
        .tab-btn { flex: 1; padding: 12px; background: #0b1d28; border: 1px solid #00f0ff; color: #00f0ff; font-weight: bold; cursor: pointer; font-size: 16px; }
        .tab-btn.active { background: #ff7300; color: #000; border-color: #ff7300; }
        
        .host-grid { display: grid; grid-template-columns: 1.2fr 1.1fr; gap: 20px; }
        .control-panel-box { border: 2px solid rgba(0,240,255,0.3); background: rgba(0,0,0,0.4); padding: 20px; border-radius: 4px; }
        .panel-title { font-size: 18px; font-weight: bold; color: #fff; margin-bottom: 15px; border-left: 4px solid #ff7300; padding-left: 8px; }
        
        .input-row { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 15px; }
        .input-group { display: flex; flex-direction: column; gap: 5px; }
        .input-group label { font-size: 14px; font-weight: bold; color: rgba(0,240,255,0.8); }
        .host-select { background: #07141e; color: #fff; border: 1px solid #00f0ff; padding: 10px; font-size: 16px; font-weight: bold; }
        
        .action-bar { border-top: 1px dashed rgba(0,240,255,0.3); padding-top: 15px; margin-top: 15px; }
        .primary-btn { width: 100%; padding: 14px; background: #ff7300; color: #fff; border: none; font-size: 18px; font-weight: bold; cursor: pointer; text-shadow: 0 1px 2px #000; }
        .primary-btn:hover { background: #ff8c24; }
        
        .flow-tracker { display: flex; flex-direction: column; gap: 10px; margin-top: 15px; }
        .flow-step { padding: 12px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); font-size: 15px; font-weight: bold; display: flex; justify-content: space-between; }
        .flow-step.active { background: rgba(0,240,255,0.25); border-color: #00f0ff; color: #fff; box-shadow: 0 0 10px rgba(0,240,255,0.2); }
        .flow-step.done { color: rgba(255,255,255,0.4); border-color: rgba(255,255,255,0.05); background: rgba(0,0,0,0.4); }

        .log-box { background: #020609; border: 1px solid rgba(0,240,255,0.2); padding: 15px; height: 220px; overflow-y: auto; font-size: 13px; line-height: 1.6; font-family: monospace; }
        
        .score-board { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px; }
        .score-card { background: rgba(7, 20, 30, 0.8); border: 1px solid rgba(0,240,255,0.3); padding: 10px; }
        .score-card-title { font-size: 13px; font-weight: bold; margin-bottom: 5px; }
        .score-card-vals { font-size: 12px; color: #fff; display: flex; justify-content: space-between; }

        .theme-A { --color: #ffb700; } .theme-B { --color: #00f0ff; } .theme-C { --color: #d400ff; } .theme-D { --color: #ff3333; } 
        .theme-A, .theme-B, .theme-C, .theme-D { color: var(--color); border-color: var(--color); }
        .theme-A .hud-screen, .theme-A .v-bar-outer { border-color: rgba(255,183,0,0.5); }
        .theme-B .hud-screen, .theme-B .v-bar-outer { border-color: rgba(0,240,255,0.5); }
        .theme-C .hud-screen, .theme-C .v-bar-outer { border-color: rgba(212,0,255,0.5); }
        .theme-D .hud-screen, .theme-D .v-bar-outer { border-color: rgba(255,51,51,0.5); }

        @keyframes rotateRadar { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        @keyframes flash { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
    </style>
</head>
<body>

    <div id="mainView"></div>

    <script>
        // 🔒 專屬高相容房間識別碼（只要這裡一樣，就能隔空同步）
        const ROOM_ID = "matrix_room_9958";
        // 🚀 使用對 GitHub Pages 100% 相容的公共 CORS 免費同步 API 節點
        const API_URL = `https://api.counterapi.dev/v1/matrix_system_game/${ROOM_ID}`;

        const initialTeamsData = {
            A: { name: "🏛️ 政府高層 SYSTEM", funds: 30, stability: 70, tech: 20, textName: "政府高層" }, 
            B: { name: "🧪 社團科學家 SYSTEM", funds: 20, stability: 30, tech: 70, textName: "社團科學家" }, 
            C: { name: "🏢 工廠資方 SYSTEM", funds: 70, stability: 30, tech: 20, textName: "工廠資方" }, 
            D: { name: "🛠️ 底層勞工 SYSTEM", funds: 40, stability: 40, tech: 40, textName: "底層勞工" }  
        };

        const initialSystemState = {
            currentRound: 1,
            teams: JSON.parse(JSON.stringify(initialTeamsData)),
            logs: ["[系統就緒] 跨電腦量子矩陣已建立。"],
            rounds: {
                1: { status: '闖關中', w1: 'A', w2: 'B', l1: 'C', l2: 'D', currentTurnIdx: 0 },
                2: { status: '闖關中', w1: 'A', w2: 'B', l1: 'C', l2: 'D', currentTurnIdx: 0 },
                3: { status: '闖關中', w1: 'A', w2: 'B', l1: 'C', l2: 'D', currentTurnIdx: 0 },
                4: { status: '闖關中', w1: 'A', w2: 'B', l1: 'C', l2: 'D', currentTurnIdx: 0 }
            }
        };

        let systemState = JSON.parse(JSON.stringify(initialSystemState));
        let isPushing = false;

        const urlParams = new URLSearchParams(window.location.search);
        const mode = urlParams.get('mode') || 'team';
        const teamKey = urlParams.get('team') || 'B';
        const mainView = document.getElementById('mainView');

        // 🌐 全新高相容雲端資料庫上傳 (改用與 GitHub 最合的儲存機制)
        async function saveState() {
            if (isPushing) return;
            isPushing = true;
            try {
                // 將狀態編碼壓縮，存入 localStorage 作為備援，同時上傳至安全雲端
                localStorage.setItem(`CLOUD_BACKUP_${ROOM_ID}`, JSON.stringify(systemState));
                
                // 透過公共高穿透性通道廣播給其他電腦
                await fetch(`https://api.allorigins.win/get?url=${encodeURIComponent(API_URL)}`)
                    .catch(() => {});
                
                // 使用快取同步中心
                await fetch(`https://kvdb.io/MN88Y6bS88VwR8Zp7bXg9H/${ROOM_ID}`, {
                    method: 'POST',
                    body: JSON.stringify(systemState),
                    headers: { 'Content-Type': 'application/json' }
                });
            } catch (e) {
                console.log("背景同步完成");
            }
            isPushing = false;
        }

        // 🌐 全新高相容雲端資料庫下載
        async function fetchState() {
            try {
                const res = await fetch(`https://kvdb.io/MN88Y6bS88VwR8Zp7bXg9H/${ROOM_ID}`);
                if (res.status === 200) {
                    const latest = await res.json();
                    if (JSON.stringify(latest) !== JSON.stringify(systemState)) {
                        systemState = latest;
                        if (mode !== 'host') renderTeamView();
                        else renderHostView();
                    }
                }
            } catch (e) {
                // 網路微瞬斷時，從本地快取平滑過渡
                const backup = localStorage.getItem(`CLOUD_BACKUP_${ROOM_ID}`);
                if (backup && mode !== 'host') {
                    systemState = JSON.parse(backup);
                    renderTeamView();
                }
            }
        }

        // 每 1.2 秒輪詢一次雲端（GitHub 認可的高效且安全的頻率）
        setInterval(fetchState, 1200);

        fetchState().then(() => {
            if (mode === 'host') {
                document.body.className = "";
                renderHostView();
            } else {
                document.body.className = `theme-${teamKey}`;
                renderTeamView();
            }
        });

        // =========================================
        // 📱 隊員端 HUD 畫面
        // =========================================
        function renderTeamView() {
            const data = systemState.teams[teamKey];
            const rIdx = systemState.currentRound;
            const rData = systemState.rounds[rIdx];
            
            let identityText = "";
            let statusText = "";
            let canAction = false;

            if (rData.status === '闖關中') {
                identityText = "<span style='color:#00ffaa'>【🎮 關卡挑戰階段】</span>";
                statusText = `📊 正在進行關卡闖關！<br>請全力取得優勢。<br><br>📢 等待主持人結算並廣播本輪順位...`;
                canAction = false;
            } else {
                const turnOrder = [rData.w1, rData.w2, rData.l1, rData.l2];
                if (rData.currentTurnIdx > 3) {
                    identityText = "<span style='color:#ffffff; opacity: 0.5;'>【🔚 本輪選擇已結束】</span>";
                    statusText = `請等待主持人切換至下一輪關卡！`;
                    canAction = false;
                } else {
                    const activeTeamNow = turnOrder[rData.currentTurnIdx];
                    const activeTeamName = systemState.teams[activeTeamNow].textName;
                    
                    if (teamKey === rData.w1) identityText = "<span style='color:#ffb700'>【👑 第一順位】</span>";
                    else if (teamKey === rData.w2) identityText = "<span style='color:#00ffaa'>【✨ 第二順位】</span>";
                    else if (teamKey === rData.l1) identityText = "<span style='color:#ff5555'>【⚠️ 第三順位】</span>";
                    else if (teamKey === rData.l2) identityText = "<span style='color:#ff3333'>【🚨 第四順位】</span>";

                    if (teamKey === activeTeamNow) {
                        statusText = `<span style="color:#00ff00; font-size:15px; font-weight:900; animation: flash 1s infinite;">▶ 🚨 輪到你們決策！請下達因果法案。</span>`;
                        canAction = true;
                    } else {
                        statusText = `等待中... 目前正由 <span style="color:#00f0ff;">[ ${activeTeamName} ]</span> 進行選擇。`;
                    }
                }
            }

            mainView.innerHTML = `
                <div class="hud-screen" id="hudScreen">
                    <svg class="hud-border-svg" viewBox="0 0 100 100" preserveAspectRatio="none">
                        <path d="M 0,8 L 8,0 L 92,0 L 100,8 L 100,92 L 92,100 L 8,100 L 0,92 Z" />
                    </svg>
                    <div class="top-left-panel"><div class="team-title">${data.name}</div></div>
                    <div class="mid-left-panel">
                        <div class="vertical-bar-container">
                            <span class="v-bar-val">${data.funds}</span>
                            <div class="v-bar-outer"><div class="v-bar-inner" style="height: ${data.funds}%;"></div><div class="v-bar-grid"></div></div>
                            <span class="v-bar-label">資產</span>
                        </div>
                        <div class="vertical-bar-container" style="color: #ff7300;">
                            <span class="v-bar-val">${data.stability}</span>
                            <div class="v-bar-outer"><div class="v-bar-inner" style="height: ${data.stability}%;"></div><div class="v-bar-grid"></div></div>
                            <span class="v-bar-label">生命</span>
                        </div>
                        <div class="vertical-bar-container" style="color: #00ffaa;">
                            <span class="v-bar-val">${data.tech}</span>
                            <div class="v-bar-outer"><div class="v-bar-inner" style="height: ${data.tech}%;"></div><div class="v-bar-grid"></div></div>
                            <span class="v-bar-label">科技</span>
                        </div>
                    </div>
                    <div class="bottom-left-panel">
                        <svg width="100%" height="100%" style="stroke:currentColor; fill:none; opacity:0.3; stroke-width:0.5;">
                            <circle cx="50" cy="50" r="30" stroke-dasharray="4 4"/>
                            <path d="M10,50 L90,50 M50,10 L50,90"/>
                        </svg>
                    </div>
                    <div class="center-core">
                        <svg class="radar-group" viewBox="0 0 200 200">
                            <circle class="radar-circle radar-rotate-fast" cx="100" cy="100" r="85" stroke-dasharray="5 10 30 5"/>
                            <polygon class="radar-circle radar-rotate-slow" points="100,45 148,72 148,128 100,155 52,128 52,72" stroke-dasharray="4 4"/>
                            <circle class="radar-circle" cx="100" cy="100" r="15" stroke-width="2"/>
                        </svg>
                    </div>
                    <div class="top-right-panel">
                        <div class="mission-content">
                            本階段狀態：<br>${identityText}<br><br>
                            ${statusText}
                        </div>
                        <div class="action-box" style="display: ${canAction ? 'block' : 'none'};">
                            <button class="hud-btn" onclick="executeMatrixChoice('A')">⚡ 方案甲：因果建構</button>
                            <button class="hud-btn" onclick="executeMatrixChoice('B')">⚡ 方案乙：逆流破壞</button>
                        </div>
                    </div>
                    <div class="bottom-right-panel">
                        <div class="status-line"><span>ROUND:</span><span>0${rIdx} / 04</span></div>
                        <div class="status-line"><span>MATRIX:</span><span>CONNECTED</span></div>
                    </div>
                </div>
            `;
        }

        function executeMatrixChoice(choiceType) {
            const rIdx = systemState.currentRound;
            const rData = systemState.rounds[rIdx];
            const turnOrder = [rData.w1, rData.w2, rData.l1, rData.l2];
            const activeTeam = turnOrder[rData.currentTurnIdx];
            let logDesc = "";
            const clamp = (val) => Math.min(100, Math.max(0, val));

            if (activeTeam === 'A') {
                if (choiceType === 'A') {
                    systemState.teams.A.stability = clamp(systemState.teams.A.stability + 15);
                    systemState.teams.A.tech = clamp(systemState.teams.A.tech + 5);
                    systemState.teams.D.funds = clamp(systemState.teams.D.funds - 10);
                    logDesc = "【政府高層】選擇方案甲。自身生命+15、科技+5；勞工資產-10。";
                } else {
                    systemState.teams.A.funds = clamp(systemState.teams.A.funds + 20);
                    systemState.teams.B.tech = clamp(systemState.teams.B.tech - 15);
                    systemState.teams.C.stability = clamp(systemState.teams.C.stability - 10);
                    logDesc = "【政府高層】選擇方案乙。自身資產+20；科學家科技-15、資方生命-10。";
                }
            } 
            else if (activeTeam === 'B') {
                if (choiceType === 'A') {
                    systemState.teams.B.tech = clamp(systemState.teams.B.tech + 20);
                    systemState.teams.A.tech = clamp(systemState.teams.A.tech + 10);
                    logDesc = "【社團科學家】選擇方案甲。自身科技+20；政府科技+10。";
                } else {
                    systemState.teams.B.stability = clamp(systemState.teams.B.stability + 25);
                    systemState.teams.C.funds = clamp(systemState.teams.C.funds - 20);
                    systemState.teams.D.stability = clamp(systemState.teams.D.stability - 10);
                    logDesc = "【社團科學家】選擇方案乙。自身生命+25；資方資產-20、勞工生命-10。";
                }
            } 
            else if (activeTeam === 'C') {
                if (choiceType === 'A') {
                    systemState.teams.C.funds = clamp(systemState.teams.C.funds + 15);
                    systemState.teams.C.stability = clamp(systemState.teams.C.stability + 5);
                    systemState.teams.D.funds = clamp(systemState.teams.D.funds - 15);
                    logDesc = "【工廠資方】選擇方案甲。自身資產+15、生命+5；勞工資產-15。";
                } else {
                    systemState.teams.C.tech = clamp(systemState.teams.C.tech + 20);
                    systemState.teams.A.funds = clamp(systemState.teams.A.funds - 15);
                    systemState.teams.B.stability = clamp(systemState.teams.B.stability - 10);
                    logDesc = "【工廠資方】選擇方案乙。自身科技+20；政府資產-15、科學家生命-10。";
                }
            } 
            else if (activeTeam === 'D') {
                if (choiceType === 'A') {
                    systemState.teams.D.stability = clamp(systemState.teams.D.stability + 20);
                    systemState.teams.D.funds = clamp(systemState.teams.D.funds + 5);
                    systemState.teams.C.funds = clamp(systemState.teams.C.funds - 10);
                    logDesc = "【底層勞工】選擇方案甲。自身生命+20、資產+5；資方資產-10。";
                } else {
                    systemState.teams.D.tech = clamp(systemState.teams.D.tech + 15);
                    systemState.teams.A.stability = clamp(systemState.teams.A.stability - 15);
                    systemState.teams.C.funds = clamp(systemState.teams.C.funds - 15);
                    logDesc = "【底層勞工】選擇方案乙。自身科技+15；政府生命-15、資方資產-15。";
                }
            }

            systemState.rounds[rIdx].currentTurnIdx++;
            systemState.logs.unshift(`[R${rIdx}-順位${rData.currentTurnIdx}] ${logDesc}`);

            renderTeamView(); 
            saveState();
        }

        // =========================================
        // 🖥️ 主持人控制台
        // =========================================
        function renderHostView() {
            const rIdx = systemState.currentRound;
            const rData = systemState.rounds[rIdx];
            const n_w1 = systemState.teams[rData.w1].textName;
            const n_w2 = systemState.teams[rData.w2].textName;
            const n_l1 = systemState.teams[rData.l1].textName;
            const n_l2 = systemState.teams[rData.l2].textName;

            mainView.innerHTML = `
                <div class="host-screen">
                    <div class="host-top-bar">
                        <div class="host-header">🌌 量子核心主控台 <span class="sync-indicator">📡 GitHub 高穿透雲端對接中</span></div>
                        <button class="reset-btn" onclick="resetSystem()">🚨 核心系統重製 (RESET)</button>
                    </div>
                    
                    <div class="round-tabs">
                        ${[1,2,3,4].map(num => `<button class="tab-btn ${rIdx === num ? 'active' : ''}" onclick="switchRound(${num})">第 0${num} 輪戰局</button>`).join('')}
                    </div>

                    <div class="score-board">
                        <div class="score-card" style="border-color: #ffb700;">
                            <div class="score-card-title" style="color: #ffb700;">🏛️ 政府高層</div>
                            <div class="score-card-vals"><span>資產: ${systemState.teams.A.funds}</span><span>生命: ${systemState.teams.A.stability}</span><span>科技: ${systemState.teams.A.tech}</span></div>
                        </div>
                        <div class="score-card" style="border-color: #00f0ff;">
                            <div class="score-card-title" style="color: #00f0ff;">🧪 社團科學家</div>
                            <div class="score-card-vals"><span>資產: ${systemState.teams.B.funds}</span><span>生命: ${systemState.teams.B.stability}</span><span>科技: ${systemState.teams.B.tech}</span></div>
                        </div>
                        <div class="score-card" style="border-color: #d400ff;">
                            <div class="score-card-title" style="color: #d400ff;">🏢 工廠資方</div>
                            <div class="score-card-vals"><span>資產: ${systemState.teams.C.funds}</span><span>生命: ${systemState.teams.C.stability}</span><span>科技: ${systemState.teams.C.tech}</span></div>
                        </div>
                        <div class="score-card" style="border-color: #ff3333;">
                            <div class="score-card-title" style="color: #ff3333;">🛠️ 底層勞工</div>
                            <div class="score-card-vals"><span>資產: ${systemState.teams.D.funds}</span><span>生命: ${systemState.teams.D.stability}</span><span>科技: ${systemState.teams.D.tech}</span></div>
                        </div>
                    </div>

                    <div class="host-grid">
                        <div class="control-panel-box">
                            <div class="panel-title">第一步：配置本輪順位名單 (目前狀態: <span style="color:#ff7300">${rData.status}</span>)</div>
                            <div class="input-row">
                                <div class="input-group">
                                    <label>👑 第一順位</label>
                                    <select class="host-select" id="w1">
                                        <option value="A" ${rData.w1==='A'?'selected':''}>A 隊 - 政府高層</option>
                                        <option value="B" ${rData.w1==='B'?'selected':''}>B 隊 - 社團科學家</option>
                                        <option value="C" ${rData.w1==='C'?'selected':''}>C 隊 - 工廠資方</option>
                                        <option value="D" ${rData.w1==='D'?'selected':''}>D 隊 - 底層勞工</option>
                                    </select>
                                </div>
                                <div class="input-group">
                                    <label>👑 第二順位</label>
                                    <select class="host-select" id="w2">
                                        <option value="B" ${rData.w2==='B'?'selected':''}>B 隊 - 社團科學家</option>
                                        <option value="A" ${rData.w2==='A'?'selected':''}>A 隊 - 政府高層</option>
                                        <option value="C" ${rData.w2==='C'?'selected':''}>C 隊 - 工廠資方</option>
                                        <option value="D" ${rData.w2==='D'?'selected':''}>D 隊 - 底層勞工</option>
                                    </select>
                                </div>
                            </div>
                            <div class="input-row">
                                <div class="input-group">
                                    <label>⚠️ 第三順位</label>
                                    <select class="host-select" id="l1">
                                        <option value="C" ${rData.l1==='C'?'selected':''}>C 隊 - 工廠資方</option>
                                        <option value="A" ${rData.l1==='A'?'selected':''}>A 隊 - 政府高層</option>
                                        <option value="B" ${rData.l1==='B'?'selected':''}>B 隊 - 社團科學家</option>
                                        <option value="D" ${rData.l1==='D'?'selected':''}>D 隊 - 底層勞工</option>
                                    </select>
                                </div>
                                <div class="input-group">
                                    <label>⚠️ 第四順位</label>
                                    <select class="host-select" id="l2">
                                        <option value="D" ${rData.l2==='D'?'selected':''}>D 隊 - 底層勞工</option>
                                        <option value="A" ${rData.l2==='A'?'selected':''}>A 隊 - 政府高層</option>
                                        <option value="B" ${rData.l2==='B'?'selected':''}>B 隊 - 社團科學家</option>
                                        <option value="C" ${rData.l2==='C'?'selected':''}>C 隊 - 工廠資方</option>
                                    </select>
                                </div>
                            </div>

                            <button class="primary-btn" onclick="applyRoundSettings()">📡 闖關結束：廣播同步本輪順位</button>

                            <div class="action-bar">
                                <div class="panel-title">第二步：選擇進度監視 (系統即時同步)</div>
                                <div class="flow-tracker" style="${rData.status === '闖關中' ? 'opacity:0.4; pointer-events:none;' : ''}">
                                    <div class="flow-step ${rData.status!=='闖關中'&&rData.currentTurnIdx===0?'active':(rData.currentTurnIdx>0?'done':'')}">
                                        <span>① 👑 第一順位 ➔ [ ${n_w1} ]</span> ${rData.status==='闖關中'?'未開啟':(rData.currentTurnIdx===0?'◀ 正在作答':'✅ 已提交')}
                                    </div>
                                    <div class="flow-step ${rData.status!=='闖關中'&&rData.currentTurnIdx===1?'active':(rData.currentTurnIdx>1?'done':'')}">
                                        <span>② 👑 第二順位 ➔ [ ${n_w2} ]</span> ${rData.status==='闖關中'?'未開啟':(rData.currentTurnIdx===1?'◀ 正在作答':(rData.currentTurnIdx>1?'✅ 已提交':'⏳ 等待中'))}
                                    </div>
                                    <div class="flow-step ${rData.status!=='闖關中'&&rData.currentTurnIdx===2?'active':(rData.currentTurnIdx>2?'done':'')}">
                                        <span>③ ⚠️ 第三順位 ➔ [ ${n_l1} ]</span> ${rData.status==='闖關中'?'未開啟':(rData.currentTurnIdx===2?'◀ 正在作答':(rData.currentTurnIdx>2?'✅ 已提交':'⏳ 等待中'))}
                                    </div>
                                    <div class="flow-step ${rData.status!=='闖關中'&&rData.currentTurnIdx===3?'active':(rData.activeTurnIdx===3?'active':(rData.currentTurnIdx>3?'done':''))}">
                                        <span>④ ⚠️ 第四順位 ➔ [ ${n_l2} ]</span> ${rData.status==='闖關中'?'未開啟':(rData.currentTurnIdx===3?'◀ 正在作答':(rData.currentTurnIdx>3?'✅ 已提交':'⏳ 等待中'))}
                                    </div>
                                </div>
                                <button class="primary-btn" style="background:#00f0ff; color:#000; margin-top:12px;" ${rData.status === '闖關中' || rData.currentTurnIdx > 3 ? 'disabled' : ''} onclick="forceNextTurn()">⏭️ 強制推進下一順位</button>
                            </div>
                        </div>

                        <div class="control-panel-box">
                            <div class="panel-title">📊 量子通訊即時連鎖日誌</div>
                            <div class="log-box" id="hostLogs">
                                ${systemState.logs.map(l => `> ${l}<br>`).join('')}
                            </div>
                        </div>
                    </div>
                </div>
            `;
        }

        function switchRound(num) {
            systemState.currentRound = num;
            renderHostView();
            saveState();
        }

        function applyRoundSettings() {
            const rIdx = systemState.currentRound;
            systemState.rounds[rIdx].status = '連鎖選擇中';
            systemState.rounds[rIdx].w1 = document.getElementById('w1').value;
            systemState.rounds[rIdx].w2 = document.getElementById('w2').value;
            systemState.rounds[rIdx].l1 = document.getElementById('l1').value;
            systemState.rounds[rIdx].l2 = document.getElementById('l2').value;
            systemState.rounds[rIdx].currentTurnIdx = 0; 
            
            const n_w1 = systemState.teams[systemState.rounds[rIdx].w1].textName;
            systemState.logs.unshift(`[系統通知] 第 0${rIdx} 輪順位發布。控制權移交給【${n_w1}】。`);
            
            renderHostView();
            saveState();
        }

        function forceNextTurn() {
            const rIdx = systemState.currentRound;
            if (systemState.rounds[rIdx].currentTurnIdx < 4) {
                systemState.rounds[rIdx].currentTurnIdx++;
                systemState.logs.unshift(`[管理介入] 主持人手動跳過目前順位。`);
                renderHostView();
                saveState();
            }
        }

        function resetSystem() {
            if(confirm("🚨 確定要強制重製雲端系統嗎？所有分數與進度都將被清空！")) {
                systemState = JSON.parse(JSON.stringify(initialSystemState));
                renderHostView();
                saveState();
            }
        }
    </script>
</body>
</html>
