<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HUD TACTICAL INTERFACE</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Courier New', Courier, monospace, "微軟正黑體"; }
        body, html { width: 100%; height: 100%; background-color: #03070a; color: #00f0ff; overflow: hidden; position: relative; }
        
        /* CRT 螢幕掃描線與暗角 */
        body::before {
            content: " "; display: block; position: absolute; top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.3) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.04), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.04));
            z-index: 999; background-size: 100% 4px, 6px 100%; pointer-events: none;
        }
        body::after {
            content: " "; display: block; position: absolute; top: 0; left: 0; bottom: 0; right: 0;
            background: radial-gradient(circle, rgba(0,0,0,0) 40%, rgba(3,7,10,0.85) 100%); z-index: 998; pointer-events: none;
        }

        #particleCanvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; opacity: 0.3; }

        /* 主面板容器 */
        .hud-screen {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 95vw; height: 95vw; max-width: 900px; max-height: 900px; z-index: 10;
            background: rgba(8, 16, 24, 0.6);
            backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(0, 240, 255, 0.25);
            box-shadow: 0 0 30px rgba(0, 240, 255, 0.15), inset 0 0 20px rgba(0, 240, 255, 0.05);
            display: grid;
            grid-template-columns: 1.3fr 2fr 1.3fr;
            grid-template-rows: 0.8fr 2fr 1fr;
            padding: 25px; gap: 20px;
        }

        .hud-border-svg {
            position: absolute; top: -1px; left: -1px; width: calc(100% + 2px); height: calc(100% + 2px);
            pointer-events: none; stroke: #00f0ff; fill: none; stroke-width: 1.5; opacity: 0.8; filter: drop-shadow(0 0 4px #00f0ff);
        }

        .top-left-panel { grid-column: 1; grid-row: 1; position: relative; display: flex; align-items: center; }

        /* 左中區塊：能量條 */
        .mid-left-panel { grid-column: 1; grid-row: 2; display: flex; gap: 15px; align-items: center; justify-content: center; }
        .vertical-bar-container { display: flex; flex-direction: column; align-items: center; gap: 8px; height: 95%; width: 30px; }
        /* 【字體放大】標籤字體放大至 14px */
        .v-bar-label { font-size: 14px; font-weight: bold; text-shadow: 0 0 8px currentColor; letter-spacing: 1px; }
        .v-bar-outer { width: 100%; height: 100%; border: 1px solid rgba(0, 240, 255, 0.4); padding: 2px; background: rgba(0,0,0,0.5); position: relative; }
        .v-bar-inner { width: 100%; background: #00f0ff; position: absolute; bottom: 2px; left: 2px; width: calc(100% - 4px); transition: height 0.8s cubic-bezier(0.1, 0.8, 0.3, 1); box-shadow: 0 0 8px currentColor; }
        .v-bar-grid { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(0deg, transparent 75%, #03070a 75%); background-size: 100% 12px; }

        .bottom-left-panel { grid-column: 1; grid-row: 3; border: 1px solid rgba(0, 240, 255, 0.2); background: rgba(0,0,0,0.2); position: relative; overflow: hidden; }

        /* 中央雷達與圖層 */
        .center-core { grid-column: 2; grid-row: 1 / span 3; display: flex; justify-content: center; align-items: center; position: relative; }
        .radar-group { position: absolute; width: 95%; height: 95%; top: 2.5%; left: 2.5%; }
        .radar-circle { fill: none; stroke: #00f0ff; stroke-width: 1; transform-origin: center; }
        .radar-rotate-fast { animation: rotateRadar 15s linear infinite; }
        .radar-rotate-slow { animation: rotateRadar 35s linear reverse infinite; }
        
        /* 徽章容器 */
        .badge-container {
            position: absolute; width: 45%; height: 45%; border-radius: 50%; z-index: 15;
            display: flex; justify-content: center; align-items: center; overflow: hidden;
            border: 2px solid rgba(0, 240, 255, 0.4);
            box-shadow: 0 0 15px rgba(0, 240, 255, 0.3);
        }
        .badge-img {
            width: 100%; height: 100%; object-fit: cover; border-radius: 50%;
            filter: contrast(1.2) brightness(1.1);
        }
        .hologram-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 240, 255, 0.15); pointer-events: none; mix-blend-mode: overlay; }

        /* 右上：MISSION 戰術指令板 */
        .top-right-panel {
            grid-column: 3; grid-row: 1 / span 2; border: 1px solid rgba(0, 240, 255, 0.3); 
            background: rgba(3, 12, 20, 0.5); padding: 15px; position: relative;
            clip-path: polygon(0 0, 85% 0, 100% 12%, 100% 100%, 0 100%);
            display: flex; flex-direction: column; gap: 10px;
        }
        /* 【字體放大】標題放大至 15px */
        .mission-header { font-size: 15px; color: #ff7300; text-shadow: 0 0 5px #ff7300; font-weight: bold; border-bottom: 1px dashed rgba(255,115,0,0.3); padding-bottom: 6px; letter-spacing: 1px; }
        /* 【字體放大】內文放大至 14px */
        .mission-content { font-size: 14px; line-height: 1.5; color: #b2ebd4; margin-bottom: 5px; flex-grow: 1; font-weight: bold; }
        /* 【字體放大】按鈕字體放大至 13px */
        .hud-btn {
            display: block; width: 100%; padding: 10px 12px; background: rgba(0, 240, 255, 0.08);
            border: 1px solid rgba(0,240,255,0.8); color: #00f0ff; text-align: left; cursor: pointer; font-size: 13px; font-weight: bold;
            transition: all 0.2s; clip-path: polygon(0 0, 96% 0, 100% 30%, 100% 100%, 4% 100%, 0 70%); margin-top: 6px;
        }
        .hud-btn:hover { background: rgba(0, 240, 255, 0.25); box-shadow: 0 0 12px rgba(0,240,255,0.5); transform: translateX(3px); }

        /* 右下：狀態艙 */
        .bottom-right-panel {
            grid-column: 3; grid-row: 3; border: 1px solid rgba(0, 240, 255, 0.2);
            padding: 12px; display: flex; flex-direction: column; justify-content: space-between;
            position: relative; clip-path: polygon(0 0, 100% 0, 100% 80%, 85% 100%, 0 100%);
        }
        /* 【字體放大】右下裝飾文字放大至 12px */
        .status-line { display: flex; justify-content: space-between; font-size: 12px; color: rgba(0,240,255,0.7); }

        .hex-decor { stroke: rgba(0,240,255,0.15); fill: none; stroke-width: 0.5; position: absolute; width: 100%; height: 100%; pointer-events: none; }

        /* 主持人中央主控台 */
        .host-screen {
            position: absolute; top: 5%; left: 5%; width: 90%; height: 90%; z-index: 20;
            background: rgba(5, 10, 15, 0.95); border: 2px solid #00f0ff; padding: 25px;
            display: flex; flex-direction: column; gap: 20px; box-shadow: 0 0 30px rgba(0,240,255,0.3);
        }
        .host-title { font-size: 26px; text-align: center; border-bottom: 2px solid #00f0ff; padding-bottom: 10px; color: #ff7300; text-shadow: 0 0 10px #ff7300; }
        .host-columns { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; flex-grow: 1; }
        .host-panel-box { border: 1px dashed rgba(0,240,255,0.4); padding: 15px; background: rgba(0,0,0,0.4); }
        select, button { background: #07141e; color: #00f0ff; border: 1px solid #00f0ff; padding: 12px; width: 100%; margin-top: 10px; font-size: 16px; cursor: pointer; }
        button { background: #ff7300; color: white; border: none; font-weight: bold; }

        /* 陣營色彩機制 */
        .theme-A { --color: #ffb700; } 
        .theme-B { --color: #00f0ff; } 
        .theme-C { --color: #d400ff; } 
        .theme-D { --color: #ff3333; } 
        
        .theme-A, .theme-B, .theme-C, .theme-D { color: var(--color); }
        .theme-A .v-bar-inner, .theme-A .hud-btn { background: rgba(255,183,0,0.1); border-color: var(--color); color: var(--color); box-shadow: 0 0 8px var(--color); }
        .theme-B .v-bar-inner, .theme-B .hud-btn { background: rgba(0,240,255,0.1); border-color: var(--color); color: var(--color); box-shadow: 0 0 8px var(--color); }
        .theme-C .v-bar-inner, .theme-C .hud-btn { background: rgba(212,0,255,0.1); border-color: var(--color); color: var(--color); box-shadow: 0 0 8px var(--color); }
        .theme-D .v-bar-inner, .theme-D .hud-btn { background: rgba(255,51,51,0.1); border-color: var(--color); color: var(--color); box-shadow: 0 0 8px var(--color); }
        .theme-A .hud-screen, .theme-A .radar-circle, .theme-A .badge-container { stroke: var(--color); border-color: rgba(255,183,0,0.4); box-shadow: 0 0 15px rgba(255,183,0,0.2); }
        .theme-B .hud-screen, .theme-B .radar-circle, .theme-B .badge-container { stroke: var(--color); border-color: rgba(0,240,255,0.4); box-shadow: 0 0 15px rgba(0,240,255,0.2); }
        .theme-C .hud-screen, .theme-C .radar-circle, .theme-C .badge-container { stroke: var(--color); border-color: rgba(212,0,255,0.4); box-shadow: 0 0 15px rgba(212,0,255,0.2); }
        .theme-D .hud-screen, .theme-D .radar-circle, .theme-D .badge-container { stroke: var(--color); border-color: rgba(255,51,51,0.4); box-shadow: 0 0 15px rgba(255,51,51,0.2); }

        @keyframes rotateRadar { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .shake { animation: shakeEffect 0.4s ease-in-out; }
        @keyframes shakeEffect {
            0%, 100% { transform: translate(-50%, -50%); }
            20% { transform: translate(-52%, -48%); }
            40% { transform: translate(-48%, -52%); }
            60% { transform: translate(-52%, -52%); }
            80% { transform: translate(-48%, -48%); }
        }
    </style>
</head>
<body class="theme-B">

    <canvas id="particleCanvas"></canvas>
    <div id="mainView"></div>

    <script>
        // 【已修正】更換為真實有效的科技、建築、工業感公開圖床網址，保證出圖！
        const globalData = {
            A: { name: "🏛️ 政府高層", funds: 85, stability: 95, tech: 45, img: "https://images.unsplash.com/photo-1541872703-74c5e44368f9?w=400&auto=format&fit=crop&q=80" }, 
            B: { name: "🧪 社團科學家", funds: 60, stability: 70, tech: 90, img: "https://images.unsplash.com/photo-1532187863486-abf9d39d6618?w=400&auto=format&fit=crop&q=80" }, 
            C: { name: "🏢 工廠資方", funds: 95, stability: 55, tech: 65, img: "https://images.unsplash.com/photo-1581092160607-ee22621dd758?w=400&auto=format&fit=crop&q=80" }, 
            D: { name: "🛠️ 底層勞工", funds: 45, stability: 80, tech: 35, img: "https://images.unsplash.com/photo-1504307651254-35680f356dfd?w=400&auto=format&fit=crop&q=80" }  
        };

        const urlParams = new URLSearchParams(window.location.search);
        const mode = urlParams.get('mode') || 'team';
        const teamKey = urlParams.get('team') || 'B';
        const mainView = document.getElementById('mainView');

        if (mode === 'host') {
            document.body.className = "";
            renderHostView();
        } else {
            document.body.className = `theme-${teamKey}`;
            renderTeamView();
        }

        function renderTeamView() {
            const data = globalData[teamKey];
            mainView.innerHTML = `
                <div class="hud-screen" id="hudScreen">
                    <svg class="hud-border-svg" viewBox="0 0 100 100" preserveAspectRatio="none">
                        <path d="M 0,10 L 10,0 L 90,0 L 100,10 L 100,90 L 90,100 L 10,100 L 0,90 Z" stroke-opacity="0.4"/>
                        <path d="M 3,0 L 15,0 M 0,3 L 0,15 M 97,0 L 85,0 M 100,3 L 100,15" stroke-width="2"/>
                    </svg>

                    <div class="top-left-panel">
                        <svg width="100%" height="40" style="stroke:currentColor; fill:none; stroke-width:1; opacity:0.7;">
                            <rect x="0" y="5" width="120" height="18" stroke-width="1.5"/>
                            <line x1="5" y1="14" x2="80" y2="14" stroke-width="3"/>
                        </svg>
                    </div>

                    <div class="mid-left-panel">
                        <div class="vertical-bar-container" style="color: #00f0ff;">
                            <span class="v-bar-label">💰</span>
                            <div class="v-bar-outer"><div class="v-bar-inner" style="height: ${data.funds}%;"></div><div class="v-bar-grid"></div></div>
                        </div>
                        <div class="vertical-bar-container" style="color: #ff7300;">
                            <span class="v-bar-label">❤️</span>
                            <div class="v-bar-outer"><div class="v-bar-inner" style="height: ${data.stability}%;"></div><div class="v-bar-grid"></div></div>
                        </div>
                        <div class="vertical-bar-container" style="color: #00ffaa;">
                            <span class="v-bar-label">⚡</span>
                            <div class="v-bar-outer"><div class="v-bar-inner" style="height: ${data.tech}%;"></div><div class="v-bar-grid"></div></div>
                        </div>
                    </div>

                    <div class="bottom-left-panel">
                        <svg class="hex-decor" viewBox="0 0 100 100">
                            <circle cx="30" cy="40" r="2" fill="#00f0ff" opacity="0.9"/>
                            <circle cx="70" cy="60" r="2" fill="#ff3333" opacity="0.8"/>
                        </svg>
                    </div>

                    <div class="center-core">
                        <div class="badge-container">
                            <img class="badge-img" src="${data.img}" alt="陣營徽章">
                            <div class="hologram-overlay"></div>
                        </div>
                        <svg class="radar-group" viewBox="0 0 200 200">
                            <circle class="radar-circle radar-rotate-fast" cx="100" cy="100" r="85" stroke-dasharray="5 8 20 5"/>
                            <circle class="radar-circle radar-rotate-slow" cx="100" cy="100" r="72" stroke-dasharray="40 8"/>
                            <circle class="radar-circle" cx="100" cy="100" r="55" stroke-width="0.5" stroke-opacity="0.5"/>
                            <path d="M 100,5 L 100,20 M 100,180 L 100,195 M 5,100 L 20,100 M 180,100 L 195,100" stroke="currentColor" stroke-width="1"/>
                        </svg>
                    </div>

                    <div class="top-right-panel" id="missionPanel">
                        <div class="mission-header">🛰️ MISSION STATUS</div>
                        <div class="mission-content" id="missionText">QUANTUM LINK STABLE.<br>系統連線成功，等待主控台指派任務...</div>
                        <div id="btnGroup">
                            <button class="hud-btn">> 執行因果同步檢測</button>
                            <button class="hud-btn">> 回傳終端定位數據</button>
                        </div>
                    </div>

                    <div class="bottom-right-panel">
                        <div class="status-line" style="font-weight:bold; color:currentColor;"><span>SYSTEM:</span><span>ONLINE</span></div>
                        <div class="status-line"><span>SECURE:</span><span>MAX</span></div>
                    </div>
                </div>
            `;
        }

        function renderHostView() {
            mainView.innerHTML = `
                <div class="host-screen">
                    <div class="host-title">🌌 臨界連鎖：量子控制台</div>
                    <div class="host-columns">
                        <div class="host-panel-box">
                            <h3>🤖 第一步：對決勝負宣判</h3>
                            <select id="winSelect">
                                <option value="A">A 隊 - 政府高層</option>
                                <option value="B">B 隊 - 社團科學家</option>
                                <option value="C">C 隊 - 工廠資方</option>
                                <option value="D">D 隊 - 底層勞工</option>
                            </select>
                            <button onclick="alert('指令已同步！')">📡 啟動全場連鎖大抉擇</button>
                        </div>
                        <div class="host-panel-box">
                            <h3>📊 戰術通訊日誌</h3>
                            <div style="font-size:14px; color:rgba(0,240,255,0.7);">[天網核心] 數據流初始化成功。</div>
                        </div>
                    </div>
                </div>
            `;
        }

        // 初始化背景粒子
        const canvas = document.getElementById('particleCanvas');
        const ctx = canvas.getContext('2d');
        let particles = [];
        function initCanvas() {
            canvas.width = window.innerWidth; canvas.height = window.innerHeight;
            particles = [];
            for(let i=0; i<30; i++) {
                particles.push({x: Math.random()*canvas.width, y: Math.random()*canvas.height, r: Math.random()*2, speed: Math.random()*0.3+0.1});
            }
        }
        function drawParticles() {
            ctx.clearRect(0,0,canvas.width,canvas.height);
            ctx.fillStyle = '#00f0ff';
            particles.forEach(p => {
                ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI*2); ctx.fill();
                p.y -= p.speed; if(p.y < 0) p.y = canvas.height;
            });
            requestAnimationFrame(drawParticles);
        }
        window.addEventListener('resize', initCanvas);
        initCanvas(); drawParticles();
    </script>
</body>
</html>
